version: '3.8'

services:
  # Base de Datos Relacional Multi-Tenant
  postgres:
    image: postgres:15-alpine
    container_name: bocam-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bocam_dev_password
      POSTGRES_DB: bocam_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Caché ultrarrápida y PubSub
  redis:
    image: redis:7-alpine
    container_name: bocam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Message Broker para Eventos asíncronos entre módulos
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bocam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"   # Protocolo AMQP
      - "15672:15672" # Interfaz de Management (UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

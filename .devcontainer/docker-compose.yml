version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bocam-db-dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: bocam_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: bocam-cache-dev
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:

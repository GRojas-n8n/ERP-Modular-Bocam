# Resolver del DNS interno de Docker (127.0.0.11). Permite resolución LAZY
# de los nombres de servicio en runtime, no al cargar el config. Así nginx
# arranca aunque algun upstream no exista todavía (durante deploys parciales,
# o levantar servicios por waves). Si un upstream esta abajo cuando llega un
# request, nginx devuelve 502 al cliente — pero el container NO crashea.
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name _;

    # ─── Static App Shell (Vite/React build) ──────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # ─── Headers comunes para todos los proxy_pass ────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header x-correlation-id $http_x_correlation_id;
    proxy_set_header x-tenant-id $http_x_tenant_id;
    proxy_set_header x-proyecto-id $http_x_proyecto_id;
    proxy_set_header x-user-id $http_x_user_id;

    # ─── Auth (incluye /master/* que tambien vive en el servicio auth) ────────
    location = /api/v1/auth/health {
        set $upstream_auth "auth:3003";
        proxy_pass http://$upstream_auth/health;
    }
    location /api/v1/auth {
        set $upstream_auth "auth:3003";
        proxy_pass http://$upstream_auth;
    }
    location /api/v1/master {
        set $upstream_auth "auth:3003";
        proxy_pass http://$upstream_auth;
    }

    # ─── Gerencia Tecnica ─────────────────────────────────────────────────────
    location = /api/v1/gerencia-tecnica/health {
        set $upstream_gt "gerencia-tecnica:3001";
        proxy_pass http://$upstream_gt/health;
    }
    location /api/v1/gerencia-tecnica {
        set $upstream_gt "gerencia-tecnica:3001";
        proxy_pass http://$upstream_gt;
    }

    # ─── Compras ──────────────────────────────────────────────────────────────
    location = /api/v1/compras/health {
        set $upstream_compras "compras:3002";
        proxy_pass http://$upstream_compras/health;
    }
    location /api/v1/compras {
        set $upstream_compras "compras:3002";
        proxy_pass http://$upstream_compras;
    }

    # ─── Finanzas ─────────────────────────────────────────────────────────────
    location = /api/v1/finanzas/health {
        set $upstream_finanzas "finanzas:3004";
        proxy_pass http://$upstream_finanzas/health;
    }
    location /api/v1/finanzas {
        set $upstream_finanzas "finanzas:3004";
        proxy_pass http://$upstream_finanzas;
    }

    # ─── Control Obra ─────────────────────────────────────────────────────────
    location = /api/v1/control-obra/health {
        set $upstream_co "control-obra:3005";
        proxy_pass http://$upstream_co/health;
    }
    location /api/v1/control-obra {
        set $upstream_co "control-obra:3005";
        proxy_pass http://$upstream_co;
    }

    # ─── Personal (perfil full) ───────────────────────────────────────────────
    location = /api/v1/personal/health {
        set $upstream_personal "personal:3006";
        proxy_pass http://$upstream_personal/health;
    }
    location /api/v1/personal {
        set $upstream_personal "personal:3006";
        proxy_pass http://$upstream_personal;
    }

    # ─── Seguridad (perfil full) ──────────────────────────────────────────────
    location = /api/v1/seguridad/health {
        set $upstream_seguridad "seguridad:3007";
        proxy_pass http://$upstream_seguridad/health;
    }
    location /api/v1/seguridad {
        set $upstream_seguridad "seguridad:3007";
        proxy_pass http://$upstream_seguridad;
    }

    # ─── Contabilidad ─────────────────────────────────────────────────────────
    location = /api/v1/contabilidad/health {
        set $upstream_cont "contabilidad:3008";
        proxy_pass http://$upstream_cont/health;
    }
    location /api/v1/contabilidad {
        set $upstream_cont "contabilidad:3008";
        proxy_pass http://$upstream_cont;
    }
}

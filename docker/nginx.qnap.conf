server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header x-correlation-id $http_x_correlation_id;
    proxy_set_header x-tenant-id $http_x_tenant_id;
    proxy_set_header x-proyecto-id $http_x_proyecto_id;
    proxy_set_header x-user-id $http_x_user_id;

    location = /api/v1/auth/health {
        proxy_pass http://auth:3003/health;
    }

    location /api/v1/auth {
        proxy_pass http://auth:3003;
    }

    location = /api/v1/gerencia-tecnica/health {
        proxy_pass http://gerencia-tecnica:3001/health;
    }

    location /api/v1/gerencia-tecnica {
        proxy_pass http://gerencia-tecnica:3001;
    }

    location = /api/v1/compras/health {
        proxy_pass http://compras:3002/health;
    }

    location /api/v1/compras {
        proxy_pass http://compras:3002;
    }

    location = /api/v1/finanzas/health {
        proxy_pass http://finanzas:3004/health;
    }

    location /api/v1/finanzas {
        proxy_pass http://finanzas:3004;
    }

    location = /api/v1/control-obra/health {
        proxy_pass http://control-obra:3005/health;
    }

    location /api/v1/control-obra {
        proxy_pass http://control-obra:3005;
    }

    location = /api/v1/personal/health {
        proxy_pass http://personal:3006/health;
    }

    location /api/v1/personal {
        proxy_pass http://personal:3006;
    }

    location = /api/v1/seguridad/health {
        proxy_pass http://seguridad:3007/health;
    }

    location /api/v1/seguridad {
        proxy_pass http://seguridad:3007;
    }

    location = /api/v1/contabilidad/health {
        proxy_pass http://contabilidad:3008/health;
    }

    location /api/v1/contabilidad {
        proxy_pass http://contabilidad:3008;
    }
}

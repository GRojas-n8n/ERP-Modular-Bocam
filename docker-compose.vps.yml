services:
  caddy:
    profiles: ["core", "full", "staging"]
    image: caddy:2-alpine
    container_name: bocam-vps-caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app-shell:
        condition: service_healthy
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - vps_caddy_data:/data
      - vps_caddy_config:/config
    networks:
      - bocam-vps-network
    restart: unless-stopped

  workspace-tooling:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: docker/Dockerfile.tooling
    container_name: bocam-vps-workspace-tooling
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-${AUTH_DATABASE_URL}}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      COMPRAS_DATABASE_URL: ${COMPRAS_DATABASE_URL}
      FINANZAS_DATABASE_URL: ${FINANZAS_DATABASE_URL}
      CONTROL_OBRA_DATABASE_URL: ${CONTROL_OBRA_DATABASE_URL}
      CONTABILIDAD_DATABASE_URL: ${CONTABILIDAD_DATABASE_URL}
      PERSONAL_DATABASE_URL: ${PERSONAL_DATABASE_URL}
      SEGURIDAD_DATABASE_URL: ${SEGURIDAD_DATABASE_URL}
      GERENCIA_TECNICA_DATABASE_URL: ${GERENCIA_TECNICA_DATABASE_URL}
      VENTAS_DATABASE_URL: ${VENTAS_DATABASE_URL:-}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bocam-vps-network
    command: ["sleep", "infinity"]
    restart: "no"

  postgres:
    image: postgres:15-alpine
    container_name: bocam-vps-postgres
    ports:
      - "5432:5432"  # <--- ESTO ABRE LA PUERTA AL MUNDO EXTERIOR
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - vps_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-postgres}"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bocam-vps-redis
    volumes:
      - vps_redis_data:/data
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bocam-vps-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD}
    volumes:
      - vps_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  auth:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/auth"
        APP_PATH: "apps/auth"
    container_name: bocam-vps-auth
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      MASTER_SECRET: ${MASTER_SECRET}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  gerencia-tecnica:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/gerencia-tecnica"
        APP_PATH: "apps/gerencia-tecnica"
    container_name: bocam-vps-gerencia-tecnica
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${GERENCIA_TECNICA_DATABASE_URL}
      GERENCIA_TECNICA_DATABASE_URL: ${GERENCIA_TECNICA_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  finanzas:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/finanzas"
        APP_PATH: "apps/finanzas"
    container_name: bocam-vps-finanzas
    environment:
      PORT: 3004
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${FINANZAS_DATABASE_URL}
      FINANZAS_DATABASE_URL: ${FINANZAS_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  compras:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/compras"
        APP_PATH: "apps/compras"
    container_name: bocam-vps-compras
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${COMPRAS_DATABASE_URL}
      COMPRAS_DATABASE_URL: ${COMPRAS_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      FINANZAS_URL: http://finanzas:3004/api/v1/finanzas
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      finanzas:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  control-obra:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/control-obra"
        APP_PATH: "apps/control-obra"
    container_name: bocam-vps-control-obra
    environment:
      PORT: 3005
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${CONTROL_OBRA_DATABASE_URL}
      CONTROL_OBRA_DATABASE_URL: ${CONTROL_OBRA_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      FINANZAS_URL: http://finanzas:3004/api/v1/finanzas
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      finanzas:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3005/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  personal:
    profiles: ["full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/personal"
        APP_PATH: "apps/personal"
    container_name: bocam-vps-personal
    environment:
      PORT: 3006
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${PERSONAL_DATABASE_URL}
      PERSONAL_DATABASE_URL: ${PERSONAL_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3006/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  seguridad:
    profiles: ["full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/seguridad"
        APP_PATH: "apps/seguridad"
    container_name: bocam-vps-seguridad
    environment:
      PORT: 3007
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${SEGURIDAD_DATABASE_URL}
      SEGURIDAD_DATABASE_URL: ${SEGURIDAD_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3007/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  contabilidad:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/contabilidad"
        APP_PATH: "apps/contabilidad"
    container_name: bocam-vps-contabilidad
    environment:
      PORT: 3008
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${CONTABILIDAD_DATABASE_URL}
      CONTABILIDAD_DATABASE_URL: ${CONTABILIDAD_DATABASE_URL}
      CONTABILIDAD_BASE_URL: ${CONTABILIDAD_BASE_URL}
      CONTABILIDAD_EVENT_BUS_NAME: contabilidad
      RABBITMQ_URL: ${RABBITMQ_URL}
      SAT_CALLBACK_SHARED_SECRET: ${SAT_CALLBACK_SHARED_SECRET}
      SAT_ADAPTER_BASE_URL: ${SAT_ADAPTER_BASE_URL}
      SAT_ADAPTER_API_KEY: ${SAT_ADAPTER_API_KEY}
      SAT_ADAPTER_TIMEOUT_MS: ${SAT_ADAPTER_TIMEOUT_MS}
      SAT_WORKER_RETRY_DELAY_MS: ${SAT_WORKER_RETRY_DELAY_MS}
      SAT_WORKER_MAX_ATTEMPTS: ${SAT_WORKER_MAX_ATTEMPTS}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3008/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  contabilidad-sat-worker:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        WORKSPACE_NAME: "@bocam/contabilidad"
        APP_PATH: "apps/contabilidad"
    container_name: bocam-vps-contabilidad-sat-worker
    command: ["sh", "-c", "node apps/contabilidad/dist/apps/contabilidad/src/sat-worker.js"]
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${CONTABILIDAD_DATABASE_URL}
      CONTABILIDAD_DATABASE_URL: ${CONTABILIDAD_DATABASE_URL}
      CONTABILIDAD_BASE_URL: ${CONTABILIDAD_BASE_URL}
      CONTABILIDAD_EVENT_BUS_NAME: contabilidad
      CONTABILIDAD_SAT_WORKER_NAME: contabilidad-sat-worker
      RABBITMQ_URL: ${RABBITMQ_URL}
      SAT_CALLBACK_SHARED_SECRET: ${SAT_CALLBACK_SHARED_SECRET}
      SAT_ADAPTER_BASE_URL: ${SAT_ADAPTER_BASE_URL}
      SAT_ADAPTER_API_KEY: ${SAT_ADAPTER_API_KEY}
      SAT_ADAPTER_TIMEOUT_MS: ${SAT_ADAPTER_TIMEOUT_MS}
      SAT_WORKER_RETRY_DELAY_MS: ${SAT_WORKER_RETRY_DELAY_MS}
      SAT_WORKER_MAX_ATTEMPTS: ${SAT_WORKER_MAX_ATTEMPTS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      contabilidad:
        condition: service_healthy
    networks:
      - bocam-vps-network
    restart: unless-stopped

  app-shell:
    profiles: ["core", "full", "staging"]
    build:
      context: .
      dockerfile: docker/Dockerfile.app-shell
    container_name: bocam-vps-app-shell
    # Exposición temporal del puerto 80 al host hasta que Caddy se levante con dominio.
    # Cuando se active Caddy, eliminar este bloque ports y dejar que solo Caddy
    # exponga 80/443 hacia el host. App-shell quedará solo accesible vía la red docker interna.
    ports:
      - "80:80"
    depends_on:
      auth:
        condition: service_healthy
      gerencia-tecnica:
        condition: service_healthy
      compras:
        condition: service_healthy
      finanzas:
        condition: service_healthy
      control-obra:
        condition: service_healthy
      contabilidad:
        condition: service_healthy
    networks:
      - bocam-vps-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

networks:
  bocam-vps-network:
    driver: bridge

volumes:
  vps_postgres_data:
  vps_redis_data:
  vps_rabbitmq_data:
  vps_caddy_data:
  vps_caddy_config:

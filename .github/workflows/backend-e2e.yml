name: Backend E2E Criticas

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bocam_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bocam_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.12-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: user
          RABBITMQ_DEFAULT_PASS: password
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # DATABASE_URL apunta al schema de finanzas por defecto.
      # Los tests de cada modulo usan su propio schema y derivan el schema
      # del modulo peer via string-replace (patron consistente en todos los tests).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas
      JWT_SECRET: bocam-ci-secret
      RABBITMQ_URL: amqp://user:password@localhost:5672
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Generar clientes Prisma ───────────────────────────────────────────────
      - name: Generate Prisma clients
        run: |
          npx prisma generate --schema apps/compras/prisma/schema.prisma
          npx prisma generate --schema apps/finanzas/prisma/schema.prisma
          npx prisma generate --schema apps/control-obra/prisma/schema.prisma
          npx prisma generate --schema apps/contabilidad/prisma/schema.prisma

      # ── Aplicar schemas al DB ─────────────────────────────────────────────────
      # Cada modulo usa su propio PostgreSQL schema para evitar que db push
      # elimine las tablas de otros modulos (drift detection + accept-data-loss
      # borraba todo lo anterior cuando se usaba schema=public compartido).
      # Los tests derivan el URL del modulo peer con string-replace del schema name.
      - name: Push Prisma schemas
        run: |
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=compras"      npx prisma db push --schema apps/compras/prisma/schema.prisma      --skip-generate --accept-data-loss
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npx prisma db push --schema apps/finanzas/prisma/schema.prisma     --skip-generate --accept-data-loss
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=control_obra" npx prisma db push --schema apps/control-obra/prisma/schema.prisma --skip-generate --accept-data-loss
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=contabilidad" npx prisma db push --schema apps/contabilidad/prisma/schema.prisma --skip-generate --accept-data-loss

      # ── TypeScript check ──────────────────────────────────────────────────────
      - name: Typecheck critical modules
        run: |
          npx tsc --noEmit -p apps/compras/tsconfig.json
          npx tsc --noEmit -p apps/finanzas/tsconfig.json
          npx tsc --noEmit -p apps/control-obra/tsconfig.json
          npx tsc --noEmit -p apps/contabilidad/tsconfig.json

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Run RabbitMQ integration
        run: npm run test:integration:event-bus

      # ── Tests inter-modulo ────────────────────────────────────────────────────
      # Cada test recibe DATABASE_URL apuntando al schema de SU modulo.
      # Los tests derivan el schema del modulo peer via string-replace:
      #   finanzas  -> schema=finanzas  (compras.events, control-obra.event, etc.)
      #   compras   -> DATABASE_URL=schema=compras, deriva schema=finanzas
      #   control_obra -> DATABASE_URL=schema=control_obra, deriva schema=finanzas
      #   contabilidad -> DATABASE_URL=schema=finanzas, deriva schema=contabilidad
      - name: Run inter-module RabbitMQ integration
        run: |
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:control-obra-event   -w @bocam/finanzas
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:control-obra-avance  -w @bocam/finanzas
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:compras-events       -w @bocam/finanzas
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=compras"      npm run test:integration:finanzas-feedback    -w @bocam/compras
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=control_obra" npm run test:integration:finanzas-pago-feedback -w @bocam/control-obra
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-pago        -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=contabilidad"   npm run test:integration:compras-oc           -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=contabilidad"   npm run test:integration:compras-oc-cancelada -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=contabilidad"   npm run test:integration:finanzas-compromiso-conciliacion  -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=contabilidad"   npm run test:integration:finanzas-liberacion-conciliacion  -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-pago-cfdi   -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-sat-externo -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-sat-worker  -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-sat-banco   -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-banco-lote  -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-banco-archivo -w @bocam/contabilidad
          DATABASE_URL="postgresql://postgres:postgres@localhost:5432/bocam_ci?schema=finanzas"     npm run test:integration:finanzas-transferencia -w @bocam/contabilidad

      - name: Run event contract hardening suite
        run: npm run test:integration:event-contracts

      - name: Run critical E2E suite
        run: npm run test:e2e:criticas

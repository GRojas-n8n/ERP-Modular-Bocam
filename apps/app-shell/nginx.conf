server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optimización: Caching de assets estáticos
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
    # Proxy hacia Microservicio: Gerencia Técnica
    location /api/v1/insumos {
        proxy_pass http://gerencia-tecnica:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header x-tenant-id $http_x_tenant_id;
        proxy_set_header x-proyecto-id $http_x_proyecto_id;
    }

    # Proxy hacia Microservicio: Compras
    location /api/v1/compras {
        proxy_pass http://compras:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header x-tenant-id $http_x_tenant_id;
        proxy_set_header x-proyecto-id $http_x_proyecto_id;
        proxy_set_header x-user-id $http_x_user_id;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

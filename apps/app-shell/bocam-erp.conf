# ============================================================
# Nginx — BocamOS ERP
# Servidor: 72.60.114.12  |  Puerto público: 80
# Frontend: /var/www/bocam-erp/dist
# Backend:  localhost:3012  (Reverse Proxy en /api/)
# ============================================================

server {
    listen 80;
    server_name 72.60.114.12;

    root /var/www/bocam-erp/dist;
    index index.html;

    # ── Charset y logs ───────────────────────────────────────
    charset utf-8;
    access_log /var/log/nginx/bocam-erp.access.log;
    error_log  /var/log/nginx/bocam-erp.error.log;

    # ── Seguridad básica ─────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Assets estáticos: cache agresivo ─────────────────────
    # Vite genera nombres con hash (ej: index-bapKg-gK.js)
    # → se pueden cachear indefinidamente
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Reverse proxy → Backend Node.js en puerto 3012 ───────
    # Cualquier petición a /api/ se redirige internamente;
    # el puerto 3012 puede cerrarse al exterior en el firewall.
    location /api/ {
        proxy_pass         http://127.0.0.1:3012;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para operaciones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # React Router usa history API: si la ruta no es un archivo
    # real, devolver index.html para que React la maneje.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
